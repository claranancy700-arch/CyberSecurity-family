<svg width="360" height="140" viewBox="0 0 360 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Cybersecurity Family</title>
  <desc id="logoDesc">CSF monogram with cyber-style vector accents.</desc>
  <defs>
    <linearGradient id="csfGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="45%" stop-color="#d7d7d7" />
      <stop offset="100%" stop-color="#111111" />
    </linearGradient>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#2a2a2a" stop-opacity="0.95" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke="url(#lineGradient)" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <path d="M22 70h42" />
    <path d="M296 70h42" />
    <path d="M36 44l22 0" />
    <path d="M302 96l22 0" />
  </g>

  <g fill="none" stroke="url(#lineGradient)" stroke-width="2.5" opacity="0.72">
    <path d="M74 32c20-12 48-18 106-18" />
    <path d="M286 108c-20 12-48 18-106 18" />
  </g>

  <circle cx="180" cy="70" r="52" fill="none" stroke="url(#lineGradient)" stroke-opacity="0.45" stroke-width="1.6" />
  <circle cx="180" cy="70" r="42" fill="none" stroke="url(#lineGradient)" stroke-opacity="0.3" stroke-width="1.4" />

  <text
    x="180"
    y="84"
    text-anchor="middle"
    fill="url(#csfGradient)"
    font-family="system-ui, -apple-system, Segoe UI, sans-serif"
    font-size="72"
    font-weight="800"
    letter-spacing="6"
    filter="url(#softGlow)"
  >
    CSF
  </text>
</svg>
