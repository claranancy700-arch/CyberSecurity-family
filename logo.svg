<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" fill="none" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">CyberTech-Family</title>
  <desc id="logoDesc">Circular emblem with bold C, t-cut dash through the right side, and bold F in metallic blue.</desc>

  <!--
    Metallic blue palette
      steel light  #E8F1FA
      steel mid    #9BB6D1
      steel deep   #3D5A7A
      chrome hi    #F5FAFF
      cobalt       #2F6FED
      azure        #5BA3F5
      navy metal   #1A3A5C
      ice text     #EAF3FC
      bar accent   #4A8FE0
    Emblem center 160,130 | outer R 110 | hole R 64
  -->

  <defs>
    <!-- Brushed metal ring: cool blue steel -->
    <linearGradient id="ringMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5FAFF"/>
      <stop offset="22%" stop-color="#C5D8EC"/>
      <stop offset="48%" stop-color="#8AABC8"/>
      <stop offset="72%" stop-color="#D0E2F4"/>
      <stop offset="100%" stop-color="#5E82A6"/>
    </linearGradient>

    <!-- Soft specular band across the ring -->
    <radialGradient id="ringSheen" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#B8D4F0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1A3A5C" stop-opacity="0.25"/>
    </radialGradient>

    <!-- Chrome-blue C -->
    <linearGradient id="cMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="35%" stop-color="#D7E9FB"/>
      <stop offset="70%" stop-color="#A9C8E8"/>
      <stop offset="100%" stop-color="#6F97BE"/>
    </linearGradient>

    <!-- Deep metallic cobalt F -->
    <linearGradient id="fFill" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="28%" stop-color="#cfcfcf"/>
      <stop offset="62%" stop-color="#949494"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Edge highlight on F -->
    <linearGradient id="fEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E7F3FF" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#5BA3F5" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D2848" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Wordmark bar -->
    <linearGradient id="barMetal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7EB6F5"/>
      <stop offset="50%" stop-color="#3D7ED6"/>
      <stop offset="100%" stop-color="#6FA8E8"/>
    </linearGradient>

    <!--
      Ring mask: white keeps fill, black cuts out.
      Center 160,130 | outer R 110 | hole R 64 | dash through right side
    -->
    <mask
      id="ringMask"
      maskUnits="userSpaceOnUse"
      x="40"
      y="10"
      width="300"
      height="240"
    >
      <rect x="40" y="10" width="300" height="240" fill="#000000"/>
      <circle cx="160" cy="130" r="110" fill="#FFFFFF"/>
      <circle cx="160" cy="130" r="64" fill="#000000"/>
      <rect x="208" y="113" width="100" height="35" rx="2" fill="#000000"/>
    </mask>
  </defs>

  <!-- Ring body: steel blue metal + sheen (same mask for both) -->
  <g id="emblem-ring" mask="url(#ringMask)">
    <circle id="ring" cx="160" cy="130" r="110" fill="url(#ringMetal)"/>
    <circle cx="160" cy="130" r="110" fill="url(#ringSheen)"/>
  </g>

  <!-- Bold C in the hole -->
  <text
    id="letter-c"
    x="156"
    y="184"
    text-anchor="middle"
    fill="url(#cMetal)"
    font-family="'Raleway Black', Haettenschweiler, sans-serif"
    font-size="150"
    font-weight="1000"
  >C</text>

  <!-- Bold F -->
  <text
    id="letter-f"
    x="270"
    y="234"
    text-anchor="start"
    fill="url(#fFill)"
    font-family="'Raleway Black', Haettenschweiler, sans-serif"
    font-size="280"
    font-weight="1000"
  >F</text>
</svg>
